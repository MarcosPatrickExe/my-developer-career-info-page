<section id="projetos" class="relative py-24">
  <div class="max-w-6xl mx-auto px-6 md:px-10">
    <p mpReveal class="font-mono text-xs text-teal tracking-widest mb-3">// projetos</p>
    <h2 mpReveal [mpRevealDelay]="0.05" class="font-display text-3xl md:text-4xl text-paper mb-16">
      Linha do tempo de produtos
    </h2>

    <div class="relative grid md:grid-cols-[40px_1fr] gap-8 md:gap-12" *ngIf="projects$ | async as projects">
      <!-- rail lateral: nó acende conforme o card correspondente entra na viewport -->
      <div class="hidden md:block relative">
        <div class="absolute left-1/2 -translate-x-1/2 top-2 bottom-2 w-px bg-line"></div>
        <div
          class="absolute left-1/2 -translate-x-1/2 top-2 w-px bg-teal transition-[height] duration-200 ease-linear"
          [style.height.%]="railFillPct"
        ></div>
        <div class="relative h-full flex flex-col justify-between">
          <div
            *ngFor="let p of projects; let i = index"
            class="w-3 h-3 rounded-full mx-auto transition-all duration-500"
            [class.bg-line]="i !== activeIndex"
            [class.bg-teal]="i === activeIndex"
            [class.scale-125]="i === activeIndex"
          ></div>
        </div>
      </div>

      <div class="flex flex-col gap-24">
        <div *ngFor="let p of projects; let i = index" class="relative">
          <!-- glow roxo que acende conforme o card entra em foco no scroll -->
          <div
            class="pointer-events-none absolute -inset-10 md:-inset-20 -z-10 rounded-[2.5rem] blur-3xl transition-opacity duration-500 ease-out"
            [style.opacity]="glowFor(i)"
            style="background: radial-gradient(ellipse 60% 55% at 50% 35%, rgba(139,124,246,0.55), rgba(45,80,191,0.2) 55%, transparent 75%);"
          ></div>

          <article
            #cardEl
            mpReveal
            class="relative z-10 rounded-2xl p-6 md:p-8 border border-line bg-gradient-to-b from-surface2 to-[#0C121C]"
          >
            <p class="font-mono text-xs text-teal tracking-widest mb-3">{{ p.tag }}</p>
            <h3 class="font-display text-2xl md:text-3xl text-paper mb-1">{{ p.name }}</h3>
            <p class="text-sm text-violet font-mono mb-5">{{ p.role }}</p>
            <p class="text-mist leading-relaxed mb-6 max-w-2xl">{{ p.summary }}</p>

            <ul class="space-y-2 mb-7">
              <li *ngFor="let h of p.highlights" class="flex gap-3 text-sm text-paper/90">
                <span class="text-teal mt-0.5">▸</span>
                <span>{{ h }}</span>
              </li>
            </ul>

            <div
              *ngIf="p.screenshots?.length"
              class="flex flex-nowrap justify-center items-end gap-3 sm:gap-6 mb-9 overflow-x-auto py-6"
              style="perspective: 1200px;"
            >
              <img
                *ngFor="let shot of p.screenshots; let si = index"
                [src]="shot.src"
                [alt]="shot.alt"
                loading="lazy"
                class="mockup-shot w-24 sm:w-32 md:w-36 shrink-0 rounded-[1.4rem] border-2 border-[#050810] shadow-[0_25px_50px_rgba(0,0,0,0.55)]"
                [style.transform]="si % 2 === 0
                  ? 'rotateY(14deg) translateY(6px)'
                  : 'rotateY(-14deg) translateY(-6px)'"
              />
            </div>

            <div class="flex flex-wrap gap-3">
              <div
                *ngFor="let s of p.stack"
                class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-surface2 border border-line group"
              >
                <img
                  [src]="iconUrl(s)"
                  [alt]="s"
                  (error)="onIconError($event)"
                  class="w-4 h-4 grayscale opacity-55 group-hover:grayscale-0 group-hover:opacity-100 transition-all"
                  loading="lazy"
                />
                <span class="text-xs font-mono text-mist">{{ s }}</span>
              </div>
            </div>
          </article>
        </div>
      </div>
    </div>
  </div>
</section>
